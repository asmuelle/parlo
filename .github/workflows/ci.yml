name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    # macos-26 image ships Xcode 26 (iOS 26 SDK + Swift 6.2), which the
    # Package.swift platform floor (iOS 26 / macOS 26) requires.
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: extractions/setup-just@v3

      - name: Install tooling
        run: brew install swiftformat swiftlint xcodegen

      - name: Check bootstrap status
        id: guard
        run: |
          if [ -f project.yml ]; then
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
            echo "::notice::project.yml not found — docs-only scaffold; skipping bootstrap/build/test."
          fi

      - name: Bootstrap
        if: steps.guard.outputs.bootstrapped == 'true'
        run: just bootstrap

      - name: Lint, build, test
        if: steps.guard.outputs.bootstrapped == 'true'
        run: just ci
