name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    # macos-26 image ships Xcode 26 (iOS 26 SDK + Swift 6.2), which the
    # Package.swift platform floor (iOS 26 / macOS 26) requires.
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - uses: extractions/setup-just@v4

      - name: Install tooling
        run: brew install swiftformat swiftlint xcodegen

      - name: Check bootstrap status
        id: guard
        run: |
          if [ -f project.yml ]; then
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
            echo "::notice::project.yml not found — docs-only scaffold; skipping bootstrap/build/test."
          fi

      - name: Bootstrap
        if: steps.guard.outputs.bootstrapped == 'true'
        run: just bootstrap

      - name: Lint, build, test
        if: steps.guard.outputs.bootstrapped == 'true'
        run: just ci
